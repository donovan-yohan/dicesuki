<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 2048 2048" role="img" aria-labelledby="title desc">
  <title id="title">Daisu D4 ImageGen UV template</title>
  <desc id="desc">Guide SVG for generating D4 dice material art. Keep island boundaries fixed. Hide guide labels before final texture use.</desc>
  <defs>
    <style>
      .background { fill: #111827; }
      .grid { fill: none; stroke: #374151; stroke-width: 2; opacity: 0.35; }
      .bleed { fill: #0e7490; fill-opacity: 0.38; stroke: #67e8f9; stroke-width: 6; }
      .safe { fill: #f59e0b; fill-opacity: 0.14; stroke: #fde68a; stroke-width: 4; stroke-dasharray: 18 12; }
      .face-label { fill: #f9fafb; font: 700 44px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .face-sublabel { fill: #d1d5db; font: 500 28px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .header { fill: #f9fafb; font: 700 42px Arial, sans-serif; }
      .header-note { fill: #d1d5db; font: 500 24px Arial, sans-serif; }
    </style>
  </defs>
  <rect class="background" width="100%" height="100%" />
  <text class="header" x="96" y="113">Daisu D4 ImageGen UV Template</text>
  <text class="header-note" x="96" y="151">Paint inside cyan bleed. Keep numerals inside gold safe zones. Preserve face and material mapping.</text>
  <g id="uv-islands">
    <g id="d4-face-1" data-face-value="1" data-material-index="0">
      <polygon class="bleed" points="546.25,195.055 850.394,721.847 242.106,721.848" />
      <polygon class="safe" points="546.25,314.461 746.985,662.144 345.515,662.144" />
      <text class="face-label" x="546.25" y="536.25">face 1</text>
      <text class="face-sublabel" x="546.25" y="576.25">material 0</text>
    </g>
    <g id="d4-face-2" data-face-value="2" data-material-index="1">
      <polygon class="bleed" points="1501.75,195.055 1805.894,721.847 1197.606,721.848" />
      <polygon class="safe" points="1501.75,314.461 1702.485,662.144 1301.015,662.144" />
      <text class="face-label" x="1501.75" y="536.25">face 2</text>
      <text class="face-sublabel" x="1501.75" y="576.25">material 1</text>
    </g>
    <g id="d4-face-3" data-face-value="3" data-material-index="2">
      <polygon class="bleed" points="546.25,1150.555 850.394,1677.347 242.106,1677.348" />
      <polygon class="safe" points="546.25,1269.961 746.985,1617.644 345.515,1617.644" />
      <text class="face-label" x="546.25" y="1491.75">face 3</text>
      <text class="face-sublabel" x="546.25" y="1531.75">material 2</text>
    </g>
    <g id="d4-face-4" data-face-value="4" data-material-index="3">
      <polygon class="bleed" points="1501.75,1150.555 1805.894,1677.347 1197.606,1677.348" />
      <polygon class="safe" points="1501.75,1269.961 1702.485,1617.644 1301.015,1617.644" />
      <text class="face-label" x="1501.75" y="1491.75">face 4</text>
      <text class="face-sublabel" x="1501.75" y="1531.75">material 3</text>
    </g>
  </g>
</svg>
