<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 2048 2048" role="img" aria-labelledby="title desc">
  <title id="title">Daisu D6 ImageGen UV template</title>
  <desc id="desc">Guide SVG for generating D6 dice material art. Keep island boundaries fixed. Hide guide labels before final texture use.</desc>
  <defs>
    <style>
      .background { fill: #111827; }
      .grid { fill: none; stroke: #374151; stroke-width: 2; opacity: 0.35; }
      .bleed { fill: #0e7490; fill-opacity: 0.38; stroke: #67e8f9; stroke-width: 6; }
      .safe { fill: #f59e0b; fill-opacity: 0.14; stroke: #fde68a; stroke-width: 4; stroke-dasharray: 18 12; }
      .face-label { fill: #f9fafb; font: 700 44px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .face-sublabel { fill: #d1d5db; font: 500 28px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .header { fill: #f9fafb; font: 700 42px Arial, sans-serif; }
      .header-note { fill: #d1d5db; font: 500 24px Arial, sans-serif; }
    </style>
  </defs>
  <rect class="background" width="100%" height="100%" />
  <text class="header" x="96" y="113">Daisu D6 ImageGen UV Template</text>
  <text class="header-note" x="96" y="151">Paint inside cyan bleed. Keep numerals inside gold safe zones. Preserve face and material mapping.</text>
  <g id="uv-islands">
    <g id="d6-face-1" data-face-value="1" data-material-index="3">
      <polygon class="bleed" points="160.02,319.27 613.98,319.27 613.98,773.23 160.02,773.23" />
      <polygon class="safe" points="237.193,396.443 536.807,396.443 536.807,696.057 237.193,696.057" />
      <text class="face-label" x="387" y="536.25">face 1</text>
      <text class="face-sublabel" x="387" y="576.25">material 3</text>
    </g>
    <g id="d6-face-2" data-face-value="2" data-material-index="4">
      <polygon class="bleed" points="797.02,319.27 1250.98,319.27 1250.98,773.23 797.02,773.23" />
      <polygon class="safe" points="874.193,396.443 1173.807,396.443 1173.807,696.057 874.193,696.057" />
      <text class="face-label" x="1024" y="536.25">face 2</text>
      <text class="face-sublabel" x="1024" y="576.25">material 4</text>
    </g>
    <g id="d6-face-3" data-face-value="3" data-material-index="0">
      <polygon class="bleed" points="1434.02,319.27 1887.98,319.27 1887.98,773.23 1434.02,773.23" />
      <polygon class="safe" points="1511.193,396.443 1810.807,396.443 1810.807,696.057 1511.193,696.057" />
      <text class="face-label" x="1661" y="536.25">face 3</text>
      <text class="face-sublabel" x="1661" y="576.25">material 0</text>
    </g>
    <g id="d6-face-4" data-face-value="4" data-material-index="1">
      <polygon class="bleed" points="160.02,1274.77 613.98,1274.77 613.98,1728.73 160.02,1728.73" />
      <polygon class="safe" points="237.193,1351.943 536.807,1351.943 536.807,1651.557 237.193,1651.557" />
      <text class="face-label" x="387" y="1491.75">face 4</text>
      <text class="face-sublabel" x="387" y="1531.75">material 1</text>
    </g>
    <g id="d6-face-5" data-face-value="5" data-material-index="5">
      <polygon class="bleed" points="797.02,1274.77 1250.98,1274.77 1250.98,1728.73 797.02,1728.73" />
      <polygon class="safe" points="874.193,1351.943 1173.807,1351.943 1173.807,1651.557 874.193,1651.557" />
      <text class="face-label" x="1024" y="1491.75">face 5</text>
      <text class="face-sublabel" x="1024" y="1531.75">material 5</text>
    </g>
    <g id="d6-face-6" data-face-value="6" data-material-index="2">
      <polygon class="bleed" points="1434.02,1274.77 1887.98,1274.77 1887.98,1728.73 1434.02,1728.73" />
      <polygon class="safe" points="1511.193,1351.943 1810.807,1351.943 1810.807,1651.557 1511.193,1651.557" />
      <text class="face-label" x="1661" y="1491.75">face 6</text>
      <text class="face-sublabel" x="1661" y="1531.75">material 2</text>
    </g>
  </g>
