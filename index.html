<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="preload" as="image" href="/brand/dicesuki-icon.svg" type="image/svg+xml" />
    <link rel="preload" as="image" href="/brand/dicesuki-wordmark.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dicesuki - 3D Dice Simulator</title>
    <meta name="description" content="Roll physics-based 3D dice together on Dicesuki — no install, right in your browser." />
    <!-- Default OpenGraph unfurl for the site root and non-room routes. Room
         deep links (/room/:id) get room-specific tags injected by api/og.js. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dicesuki" />
    <meta property="og:title" content="Dicesuki — 3D Dice Simulator" />
    <meta property="og:description" content="Roll physics-based 3D dice together on Dicesuki — no install, right in your browser." />
    <meta name="twitter:card" content="summary" />
    <meta name="theme-color" content="#f3ebe2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a101d" media="(prefers-color-scheme: dark)" />
    <style>
      :root {
        --startup-splash-bg: #f3ebe2;
        --startup-splash-text: rgba(75, 41, 72, 0.78);
        --startup-splash-border: rgba(63, 29, 63, 0.16);
        --startup-splash-track: rgba(255, 255, 255, 0.48);
        --startup-splash-pink-glow: rgba(249, 135, 151, 0.13);
        --startup-splash-purple-glow: rgba(156, 137, 196, 0.16);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --startup-splash-bg: #1a101d;
          --startup-splash-text: rgba(250, 238, 247, 0.82);
          --startup-splash-border: rgba(250, 238, 247, 0.18);
          --startup-splash-track: rgba(255, 255, 255, 0.1);
          --startup-splash-pink-glow: rgba(249, 135, 151, 0.12);
          --startup-splash-purple-glow: rgba(156, 137, 196, 0.2);
        }
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--startup-splash-bg);
      }
      .startup-splash-shell {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
        box-sizing: border-box;
        background:
          radial-gradient(circle at 18% 16%, var(--startup-splash-pink-glow), transparent 34%),
          radial-gradient(circle at 82% 78%, var(--startup-splash-purple-glow), transparent 38%),
          var(--startup-splash-bg);
      }
      .startup-splash-shell__content {
        display: flex;
        width: min(84vw, 448px);
        flex-direction: column;
        align-items: center;
      }
      .startup-splash-shell__icon { width: min(72vw, 336px); height: auto; }
      .startup-splash-shell__wordmark { width: min(78vw, 384px); height: auto; margin-top: 11px; }
      .startup-splash-shell__progress {
        width: min(72vw, 336px);
        height: 10px;
        margin-top: 32px;
        overflow: hidden;
        border: 2px solid var(--startup-splash-border);
        border-radius: 999px;
        background: var(--startup-splash-track);
      }
      .startup-splash-shell__progress::before {
        display: block;
        width: 12%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #f98797 0%, #9c89c4 100%);
        content: '';
      }
      .startup-splash-shell__status {
        margin: 14px 0 0;
        color: var(--startup-splash-text);
        font: 600 14px/1.25 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="startup-splash-shell" role="status" aria-label="Loading Dicesuki">
        <div class="startup-splash-shell__content">
          <img class="startup-splash-shell__icon" src="/brand/dicesuki-icon.svg" alt="" />
          <img class="startup-splash-shell__wordmark" src="/brand/dicesuki-wordmark.svg" alt="Dicesuki" />
          <div class="startup-splash-shell__progress" aria-hidden="true"></div>
          <p class="startup-splash-shell__status">Loading Dicesuki…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
